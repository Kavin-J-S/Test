name: Condition Demo
on: workflow_dispatch
jobs:
    condition-demo:
        runs-on: ubuntu-latest
        if: github.refs == 'refs/heads/main'
        steps:
            - name: Step 1
              run: echo "This workflow runs only on the main branch."

            - name: Step 2
              if: success() 
              run: echo "Hello, the previous step was successful!"