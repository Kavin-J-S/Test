name: Explore Github Actions

on:
    push:
        branches: [ main ]
    workflow_dispatch:

jobs:
    build:
        name: Build 
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Display runner information
              run: |
                echo "Running on: $RUNNER_OS"
                echo "Runner arch: $RUNNER_ARCH"
                echo "Workspace: $GITHUB_WORKSPACE"
                echo "Repository: $GITHUB_REPOSITORY"
                echo "Event name: $GITHUB_EVENT_NAME"
                echo "SHA: $GITHUB_SHA"

            - name: Display installed tools
              run: |
                echo "Node version:"
                node --version || echo "Node.js is not installed"
                echo "Python version:"
                python --version || echo "Python is not installed"
                echo "Java version:"
                java -version || echo "Java is not installed"
                echo "Docker version:"
                docker --version || echo "Docker is not installed"
        
    test:
        name: Test Job
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Run Mock test
              run: |
                echo "Running unit test"
                echo "all tests passes"
            
    notify:
        name: Notification Job
        runs-on: ubuntu-latest
        needs: [build, test]
        if: always()
        steps:
            - name: Send notification
              run: echo "Build and test complete for $GITHUB_SHA"


